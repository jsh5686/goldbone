<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <section class="lotto-panel" aria-labelledby="lotto-title">
            <h1 id="lotto-title">Lotto Number Generator</h1>
            <div class="numbers"></div>
            <button id="generate" type="button">Generate Numbers</button>
        </section>

        <section class="contact-panel" aria-labelledby="contact-title">
            <h2 id="contact-title">제휴문의</h2>
            <form action="https://formspree.io/f/xnjrbqbe" method="POST">
                <label>
                    이름
                    <input type="text" name="name" autocomplete="name" required>
                </label>
                <label>
                    이메일
                    <input type="email" name="email" autocomplete="email" required>
                </label>
                <label>
                    문의 내용
                    <textarea name="message" rows="5" required></textarea>
                </label>
                <button type="submit">문의 보내기</button>
            </form>
        </section>
        <section class="comments-panel" aria-labelledby="comments-title">
            <h2 id="comments-title">댓글</h2>
            <div id="disqus_thread"></div>
        </section>
    </div>
    <script src="main.js"></script>
    <script>
        var disqus_config = function () {
            this.page.url = window.location.href;
            this.page.identifier = 'goldbone-home';
        };

        (function () {
            var d = document;
            var s = d.createElement('script');
            s.src = 'https://goldbone0.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
        })();
    </script>
    <noscript>
        Please enable JavaScript to view the
        <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a>
    </noscript>
</body>
</html>
